name: Build PDF
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Fix checkout
        run: git config --system --add safe.directory $GITHUB_WORKSPACE

      - name: Install fonts
        run: |
          find /usr/local/texlive -name 'texlive-fontconfig.conf' -exec ln -s {} /etc/fonts/conf.d/09-texlive-fonts.conf \;
          fc-cache

      - name: Generate gitinfo2 data
        run: |
          ./third_party/gitinfo2/post-xxx-sample.sh && cat .git/gitHeadInfo.gin

      - name: Build PDF documents with latexmk
        run: latexmk

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pdf
          path: build/*.pdf

  compare:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: pdf
          path: new

      - name: Download latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./old
          gh release download --repo ${{ github.repository }} --pattern "*.pdf" -D ./old

      - name: Compare files
        run: |
          for file in ./new/*.pdf; do
            echo "Comparing $file with ./old/$(basename $file)"
          done

  deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: pdf

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.pdf"
          token: ${{ secrets.GITHUB_TOKEN }}
